<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 13 — background-only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="label-overlay">Template: <strong style="color: var(--color-bg-primary);">background-only</strong></div>

    <div class="slide active" style="background-color: var(--color-accent-main); justify-content: flex-end; align-items: flex-start; padding: 4rem;">
        <div style="max-width: 600px;">
            <p class="header-font text-3xl font-bold" style="color: rgba(255,255,255,0.9); line-height: 1.4;">
                A full-bleed background with minimal text overlay.
            </p>
        </div>
        <aside class="notes">Use this for impact moments — an evocative image, a bold color field, or a full-screen graphic. Text is optional.</aside>
    </div>

    <div class="slide-nav">
        <button id="prevBtn" class="btn btn-outline-light"><i class="ph ph-caret-left"></i> Previous</button>
        <button id="nextBtn" class="btn btn-primary">Next <i class="ph ph-caret-right"></i></button>
    </div>

    <script src="presentation_slide_config.js"></script>
    <script src="slide_controls.js"></script>
    <style>
        .label-overlay { position: fixed; top: 1.5rem; left: 2rem; z-index: 200; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); font-family: 'Inter', sans-serif; }
        aside.notes { display: none; }
    </style>
</body>
</html>
