<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 7 — quote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link rel="stylesheet" href="main.css">
</head>
<body class="bg-primary">
    <div class="label-overlay">Template: <strong>quote</strong></div>

    <div class="slide active" style="justify-content: center; align-items: center; text-align: center;">
        <div class="editorial-grid" style="width: 100%;">
            <div class="content-narrow" style="text-align: center;">
                <div style="font-size: 6rem; line-height: 0.5; color: var(--color-accent-main); font-family: Georgia, serif; margin-bottom: 1rem;">&ldquo;</div>
                <blockquote class="header-font text-4xl font-bold text-primary" style="line-height: 1.4; margin: 0 0 2rem 0;">
                    Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore.
                </blockquote>
                <div style="width: 3rem; height: 3px; background: var(--color-accent-main); margin: 0 auto 1.5rem;"></div>
                <cite style="font-style: normal; color: var(--color-divider); font-size: 1rem; letter-spacing: 0.05em; text-transform: uppercase;">— Marcus Lipsum, <em>De Finibus, 45 BC</em></cite>
            </div>
        </div>
        <aside class="notes">Let the quote breathe. Read it aloud slowly before moving on.</aside>
    </div>

    <div class="slide-nav">
        <button id="prevBtn" class="btn btn-outline"><i class="ph ph-caret-left"></i> Previous</button>
        <button id="nextBtn" class="btn btn-primary">Next <i class="ph ph-caret-right"></i></button>
    </div>

    <script src="presentation_slide_config.js"></script>
    <script src="slide_controls.js"></script>
    <style>
        .label-overlay { position: fixed; top: 1.5rem; left: 2rem; z-index: 200; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-divider); font-family: 'Inter', sans-serif; }
        aside.notes { display: none; }
    </style>
</body>
</html>
