<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 21 — layout: stack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="../source_files/themes/steady.css">
</head>
<body class="bg-primary">
    <div class="label-overlay">Template: <strong>layout: stack</strong> &nbsp;·&nbsp; press <kbd>→</kbd> to layer</div>
    <!-- Watermark -->
    <div style="position: fixed; top: calc(3.5rem - 10px); left: 2rem; z-index: 150; display: flex; flex-direction: row; align-items: center; gap: 0.4rem; pointer-events: none; opacity: 0.35;">
        <i class="ph ph-presentation" style="font-size: 20px; color: var(--color-divider);"></i>
        <span style="font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 0.12em; color: var(--color-divider); line-height: 1;">SLYDZ</span>
    </div>

    <div class="slide active" style="justify-content: center; align-items: center;">
        <div class="editorial-grid" style="width: 100%;">
            <div class="content-standard" style="text-align: center;">
                <span class="label-text">Overlapping Layers</span>
                <h2 class="header-font text-4xl font-black text-primary mb-10">Build Up a Diagram</h2>
                <!-- stack: concentric layers, each fragment adds a ring -->
                <div style="position: relative; height: 260px; margin: 0 auto; max-width: 480px;">
                    <div style="position: absolute; inset: 0; border: 2px dashed var(--color-divider); border-radius: 8px; background: var(--color-base-subtle-1);">
                        <span style="position: absolute; top: 10px; left: 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-divider);">Base layer</span>
                    </div>
                    <div class="fragment" style="position: absolute; inset: 28px; border: 2px solid var(--color-accent-main); border-radius: 6px; background: rgba(75,64,249,0.06);">
                        <span style="position: absolute; top: 10px; left: 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-accent-main);">Layer 2</span>
                    </div>
                    <div class="fragment" style="position: absolute; inset: 56px; border: 2px solid var(--color-utility-confirmation); border-radius: 4px; background: rgba(0,139,139,0.06);">
                        <span style="position: absolute; top: 10px; left: 14px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-utility-confirmation);">Layer 3</span>
                    </div>
                </div>
            </div>
        </div>
        <aside class="notes">Stack layers annotations over a base diagram. Each advance reveals a new layer in place, building complexity without jumping to a new slide.</aside>
    </div>

    <div class="slide-nav">
        <button id="prevBtn" class="btn btn-outline"><i class="ph ph-caret-left"></i> Previous</button>
        <button id="nextBtn" class="btn btn-primary">Next <i class="ph ph-caret-right"></i></button>
    </div>

    <script src="presentation_slide_config.js"></script>
    <script src="slide_engine.js"></script>
    <style>
        .label-overlay { position: fixed; top: 1.5rem; left: 2rem; z-index: 200; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-divider); font-family: 'Inter', sans-serif; }
        kbd { background: var(--color-base-subtle-1); padding: 1px 5px; border-radius: 3px; font-family: monospace; }
        aside.notes { display: none; }
        .fragment { opacity: 0; transition: opacity 0.4s ease; }
        .fragment.visible { opacity: 1; }
    </style>
</body>
</html>
