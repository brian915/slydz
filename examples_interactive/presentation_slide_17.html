<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 17 — progressive reveal: shrink/grow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link rel="stylesheet" href="main.css">
</head>
<body class="bg-primary">
    <div class="label-overlay">Template: <strong>progressive reveal: shrink / grow</strong> &nbsp;·&nbsp; press <kbd>→</kbd> to animate</div>
    <!-- Watermark -->
    <div style="position: fixed; top: calc(3.5rem - 10px); left: 2rem; z-index: 150; display: flex; flex-direction: row; align-items: center; gap: 0.4rem; pointer-events: none; opacity: 0.35;">
        <i class="ph ph-presentation" style="font-size: 20px; color: var(--color-divider);"></i>
        <span style="font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 0.12em; color: var(--color-divider); line-height: 1;">SLYDZ</span>
    </div>

    <div class="slide active" style="justify-content: center; align-items: center;">
        <div class="editorial-grid" style="width: 100%; align-items: center;">
            <div class="content-standard" style="text-align: center;">
                <span class="label-text">Scale Transforms</span>
                <h2 class="header-font text-4xl font-black text-primary mb-12">Elements That Move</h2>
                <div style="display: flex; justify-content: center; gap: 4rem; align-items: center;">
                    <div class="reveal scale-up" style="transition: transform 0.4s ease; transform-origin: center;">
                        <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--color-accent-main); display: flex; align-items: center; justify-content: center;">
                            <i class="ph ph-arrow-up" style="font-size: 2.5rem; color: white;"></i>
                        </div>
                        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--color-divider); text-transform: uppercase; letter-spacing: 0.05em;">Grows</p>
                    </div>
                    <div class="reveal scale-down" style="transition: transform 0.4s ease; transform-origin: center;">
                        <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--color-text-primary); display: flex; align-items: center; justify-content: center;">
                            <i class="ph ph-arrow-down" style="font-size: 2.5rem; color: white;"></i>
                        </div>
                        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--color-divider); text-transform: uppercase; letter-spacing: 0.05em;">Shrinks</p>
                    </div>
                </div>
            </div>
        </div>
        <aside class="notes">First advance grows the left element, second shrinks the right. Good for emphasis or contrast.</aside>
    </div>

    <div class="slide-nav">
        <button id="prevBtn" class="btn btn-outline"><i class="ph ph-caret-left"></i> Previous</button>
        <button id="nextBtn" class="btn btn-primary">Next <i class="ph ph-caret-right"></i></button>
    </div>

    <script src="presentation_slide_config.js"></script>
    <script src="slide_engine.js"></script>
    <style>
        .label-overlay { position: fixed; top: 1.5rem; left: 2rem; z-index: 200; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-divider); font-family: 'Inter', sans-serif; }
        kbd { background: var(--color-base-subtle-1); padding: 1px 5px; border-radius: 3px; font-family: monospace; }
        aside.notes { display: none; }
        /* progressive reveal styles in main.css */
    </style>
</body>
</html>
