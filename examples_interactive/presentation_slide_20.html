<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 20 — layout: hstack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link rel="stylesheet" href="main.css">
</head>
<body class="bg-primary">
    <div class="label-overlay">Template: <strong>layout: hstack</strong></div>
    <!-- Watermark -->
    <div style="position: fixed; top: calc(3.5rem - 10px); left: 2rem; z-index: 150; display: flex; flex-direction: row; align-items: center; gap: 0.4rem; pointer-events: none; opacity: 0.35;">
        <i class="ph ph-presentation" style="font-size: 20px; color: var(--color-divider);"></i>
        <span style="font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 0.12em; color: var(--color-divider); line-height: 1;">SLYDZ</span>
    </div>

    <div class="slide active">
        <div class="editorial-grid">
            <div class="content-standard">
                <span class="label-text">Horizontal Stack</span>
                <h2 class="header-font text-5xl font-black text-primary mb-10">Flex Row, No Column Math</h2>
                <!-- hstack: flex row, centered, gap -->
                <div class="hstack">
                    <div style="text-align: center;">
                        <i class="ph ph-lightning" style="font-size: 3rem; color: var(--color-accent-main); display: block; margin-bottom: 0.5rem;"></i>
                        <span style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-divider);">Speed</span>
                    </div>
                    <div style="text-align: center;">
                        <i class="ph ph-shield-check" style="font-size: 3rem; color: var(--color-utility-confirmation); display: block; margin-bottom: 0.5rem;"></i>
                        <span style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-divider);">Safety</span>
                    </div>
                    <div style="text-align: center;">
                        <i class="ph ph-chart-line-up" style="font-size: 3rem; color: var(--color-utility-confirmation); display: block; margin-bottom: 0.5rem;"></i>
                        <span style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-divider);">Scale</span>
                    </div>
                    <div style="text-align: center;">
                        <i class="ph ph-heart" style="font-size: 3rem; color: var(--color-accent-main); display: block; margin-bottom: 0.5rem;"></i>
                        <span style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-divider);">Care</span>
                    </div>
                </div>
                <p style="color: var(--color-divider); font-size: 0.85rem; margin-top: 2rem; text-align: center; font-style: italic;">
                    .hstack — flex row, items centered, equal gap — no grid columns needed
                </p>
            </div>
        </div>
        <aside class="notes">Use hstack for loose horizontal groupings: icons, logos, small stats, badges — anywhere column precision isn't needed.</aside>
    </div>

    <div class="slide-nav">
        <button id="prevBtn" class="btn btn-outline"><i class="ph ph-caret-left"></i> Previous</button>
        <button id="nextBtn" class="btn btn-primary">Next <i class="ph ph-caret-right"></i></button>
    </div>

    <script src="presentation_slide_config.js"></script>
    <script src="slide_engine.js"></script>
    <style>
        .label-overlay { position: fixed; top: 1.5rem; left: 2rem; z-index: 200; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-divider); font-family: 'Inter', sans-serif; }
        aside.notes { display: none; }
        /* hstack now in main.css */
    </style>
</body>
</html>
